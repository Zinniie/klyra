name: klyra
description: Klyra — A full-featured fintech wallet app built with Flutter, Firebase, Stripe, and BLoC.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── State Management ──
  flutter_bloc: ^8.1.3
  equatable: ^2.0.5

  # ── Firebase ──
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_messaging: ^14.7.10
  firebase_storage: ^11.5.6

  # ── Payments ──
  flutter_stripe: ^10.1.1

  # ── Navigation ──
  go_router: ^13.0.1

  # ── Networking ──
  dio: ^5.4.0
  pretty_dio_logger: ^1.3.1

  # ── Local Storage & Security ──
  flutter_secure_storage: ^9.0.0
  hive_flutter: ^1.1.0
  shared_preferences: ^2.2.2

  # ── Biometric Auth ──
  local_auth: ^2.1.8

  # ── UI & UX ──
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  lottie: ^3.0.0
  flutter_svg: ^2.0.9
  gap: ^3.0.1
  intl: ^0.19.0
  pinput: ^5.0.0

  # ── Charts ──
  fl_chart: ^0.66.0

  # ── Utilities ──
  uuid: ^4.3.3
  dartz: ^0.10.1
  get_it: ^7.6.7
  injectable: ^2.3.2
  logger: ^2.0.2+1
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1
  permission_handler: ^11.2.0
  image_picker: ^1.0.7
  share_plus: ^7.2.2
  url_launcher: ^6.2.5
  connectivity_plus: ^5.0.2
  package_info_plus: ^5.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  bloc_test: ^9.1.5
  mocktail: ^1.0.3
  build_runner: ^2.4.7
  freezed: ^2.4.6
  json_serializable: ^6.7.1
  injectable_generator: ^2.4.1
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
    - assets/fonts/

  fonts:
    - family: DMSans
      fonts:
        - asset: assets/fonts/DMSans-Regular.ttf
        - asset: assets/fonts/DMSans-Medium.ttf
          weight: 500
        - asset: assets/fonts/DMSans-Bold.ttf
          weight: 700
    - family: Fraunces
      fonts:
        - asset: assets/fonts/Fraunces-Light.ttf
          weight: 300
        - asset: assets/fonts/Fraunces-Regular.ttf
        - asset: assets/fonts/Fraunces-SemiBold.ttf
          weight: 600
